<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="artTitle artDesc">
  <title id="artTitle">Developer rig with floating tech chips</title>
  <desc id="artDesc">An abstract workstation with a code screen and floating chips linked by neon wires; colors match a sky/slate theme.</desc>

  <defs>
    <linearGradient id="slateBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0a0f1c"/>
    </linearGradient>
    <radialGradient id="aquaGlow" cx="50%" cy="10%" r="80%">
      <stop offset="0" stop-color="rgba(56,189,248,0.35)"/>
      <stop offset="0.6" stop-color="rgba(56,189,248,0.08)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- soft backdrop glow -->
  <rect width="860" height="620" fill="url(#aquaGlow)" opacity="0.7"/>

  <!-- workstation shadow -->
  <ellipse cx="430" cy="520" rx="280" ry="34" fill="#0b1220" opacity="0.35"/>

  <!-- monitor -->
  <g transform="translate(160,100)">
    <rect x="0" y="0" width="540" height="320" rx="18" fill="url(#slateBody)"/>
    <rect x="18" y="18" width="504" height="284" rx="12" fill="url(#screenGrad)" stroke="#0b1220"/>
    <circle cx="270" cy="8" r="3" fill="#1f2937" stroke="#334155"/>

    <!-- tabs -->
    <g transform="translate(30,28)">
      <rect width="184" height="20" rx="10" fill="rgba(56,189,248,0.14)"/>
      <rect x="196" width="140" height="20" rx="10" fill="#0f172a"/>
      <rect x="340" width="108" height="20" rx="10" fill="#0f172a"/>
    </g>

    <!-- code lines -->
    <g opacity="0.95">
      <rect x="40" y="70" width="420" height="10" rx="5" fill="#1e293b" stroke="#0ea5e9"/>
      <rect x="40" y="90" width="384" height="10" rx="5" fill="#111827"/>
      <rect x="40" y="110" width="348" height="10" rx="5" fill="#111827"/>
      <rect x="40" y="130" width="312" height="10" rx="5" fill="#1e293b" stroke="#0ea5e9"/>
      <rect x="40" y="150" width="420" height="10" rx="5" fill="#111827"/>
      <rect x="40" y="170" width="384" height="10" rx="5" fill="#111827"/>
      <rect x="40" y="190" width="348" height="10" rx="5" fill="#1e293b" stroke="#0ea5e9"/>
      <rect x="40" y="210" width="312" height="10" rx="5" fill="#111827"/>
      <rect x="40" y="230" width="420" height="10" rx="5" fill="#111827"/>
      <rect x="40" y="250" width="384" height="10" rx="5" fill="#1e293b" stroke="#0ea5e9"/>
      <rect x="40" y="270" width="348" height="10" rx="5" fill="#111827"/>
    </g>
  </g>

  <!-- stand -->
  <g transform="translate(380,420)">
    <rect x="0" y="0" width="100" height="16" rx="8" fill="#0f172a"/>
    <rect x="-60" y="16" width="220" height="18" rx="9" fill="url(#slateBody)"/>
  </g>

  <!-- neon wires -->
  <g fill="none" stroke="url(#wire)" stroke-width="2">
    <path d="M540,220 C630,220 650,280 690,300" opacity="0.9"/>
    <path d="M540,240 C620,260 640,360 700,380" opacity="0.8"/>
    <path d="M320,290 C240,300 210,360 190,400" opacity="0.75"/>
    <path d="M480,160 C520,120 600,120 640,110" opacity="0.7"/>
  </g>

  <!-- chip: React-ish atom -->
  <g transform="translate(700,280)">
    <rect x="-40" y="-40" width="80" height="80" rx="18" fill="url(#chipGrad)" stroke="#1e293b"/>
    <circle cx="0" cy="0" r="8" fill="#38bdf8"/>
    <ellipse cx="0" cy="0" rx="24" ry="10" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <g transform="rotate(60)">
      <ellipse cx="0" cy="0" rx="24" ry="10" fill="none" stroke="#38bdf8" stroke-width="2"/>
    </g>
    <g transform="rotate(120)">
      <ellipse cx="0" cy="0" rx="24" ry="10" fill="none" stroke="#38bdf8" stroke-width="2"/>
    </g>
  </g>

  <!-- chip: kube-ish wheel -->
  <g transform="translate(720,400)">
    <rect x="-36" y="-36" width="72" height="72" rx="16" fill="url(#chipGrad)" stroke="#1e293b"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <line x1="0" y1="0" x2="20" y2="0" stroke="#22d3ee" stroke-width="2"/>
    <line x1="0" y1="0" x2="10" y2="17.3205" stroke="#22d3ee" stroke-width="2"/>
    <line x1="0" y1="0" x2="-10" y2="17.3205" stroke="#22d3ee" stroke-width="2"/>
    <line x1="0" y1="0" x2="-20" y2="0" stroke="#22d3ee" stroke-width="2"/>
    <line x1="0" y1="0" x2="-10" y2="-17.3205" stroke="#22d3ee" stroke-width="2"/>
    <line x1="0" y1="0" x2="10" y2="-17.3205" stroke="#22d3ee" stroke-width="2"/>
  </g>

  <!-- chip: terminal -->
  <g transform="translate(160,420)">
    <rect x="-44" y="-28" width="88" height="56" rx="14" fill="url(#chipGrad)" stroke="#1e293b"/>
    <path d="M-18,-6 l12,10 l-12,10" stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="6" y="6" width="24" height="4" rx="2" fill="#94a3b8"/>
  </g>

  <!-- chip: cloud -->
  <g transform="translate(650,110)">
    <rect x="-34" y="-34" width="68" height="68" rx="16" fill="url(#chipGrad)" stroke="#1e293b"/>
    <path d="M-14,8a12,12 0 1 1 22-8a10,10 0 1 1 6,18h-28a8,8 0 0 1 0-16" fill="#38bdf8" opacity="0.95"/>
  </g>

  <!-- sparkles -->
  <g transform="translate(620,210)" opacity="0.8">
    <circle cx="0" cy="0" r="1.5" fill="#e0f2fe"/>
    <circle cx="10" cy="-6" r="1.5" fill="#bae6fd"/>
    <circle cx="-8" cy="8" r="1.5" fill="#bae6fd"/>
  </g>
  <g transform="translate(744,320)" opacity="0.8">
    <circle cx="0" cy="0" r="1.5" fill="#e0f2fe"/>
    <circle cx="10" cy="-6" r="1.5" fill="#bae6fd"/>
    <circle cx="-8" cy="8" r="1.5" fill="#bae6fd"/>
  </g>
  <g transform="translate(208,420)" opacity="0.8">
    <circle cx="0" cy="0" r="1.5" fill="#e0f2fe"/>
    <circle cx="10" cy="-6" r="1.5" fill="#bae6fd"/>
    <circle cx="-8" cy="8" r="1.5" fill="#bae6fd"/>
  </g>
  <g transform="translate(660,120)" opacity="0.8">
    <circle cx="0" cy="0" r="1.5" fill="#e0f2fe"/>
    <circle cx="10" cy="-6" r="1.5" fill="#bae6fd"/>
    <circle cx="-8" cy="8" r="1.5" fill="#bae6fd"/>
  </g>
  <g transform="translate(700,388)" opacity="0.8">
    <circle cx="0" cy="0" r="1.5" fill="#e0f2fe"/>
    <circle cx="10" cy="-6" r="1.5" fill="#bae6fd"/>
    <circle cx="-8" cy="8" r="1.5" fill="#bae6fd"/>
  </g>
</svg>
